<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Objednávka Motorové Pily</title>

<style>
body {
    font-family: Arial;
    background: #f4f7fb;
}
h1 {
    text-align: center;
    background: #2a72d4;
    color: white;
    padding: 20px;
}
.container {
    width: 90%;
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
}
.item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 12px 0;
}
.summary {
    margin-top: 20px;
    background: #eef4ff;
    padding: 10px;
    border-radius: 8px;
}
input[type="number"] {
    width: 60px;
    text-align: center;
}
input {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 10px;
}
#celkem, #pocet {
    text-align: center;
    font-size: 20px;
    margin-top: 10px;
    font-weight: bold;
    color: #2a72d4;
}
button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    font-size: 20px;
    background: orange;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
.error {
    border: 2px solid red;
}
</style>
</head>

<body>

<h1>Stihl – Motorové pily</h1>

<div class="container">

    <h3>Údaje zákazníka</h3>
    <input id="jmeno" placeholder="Jméno" required>
    <input id="prijmeni" placeholder="Příjmení" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="telefon" placeholder="Telefon" required>

    <hr>

    <div id="items"></div>

    <div id="celkem">Celková cena: 0 Kč</div>
    <div id="pocet">Počet kusů: 0</div>

    <div class="summary">
        <h3>Shrnutí objednávky</h3>
        <div id="summaryList">Žádné produkty</div>
    </div>

    <button onclick="odeslatObjednavku()">ODESLAT</button>

</div>

<script>

let items = [];

async function loadCSV() {
    const res = await fetch("Stihl.csv?t=" + Date.now());
    const text = await res.text();
    parseCSV(text);
    renderItems();
}

function parseCSV(text) {
    const lines = text.split("\n");
    items = [];

    for (let i = 1; i < lines.length; i++) {
        const [nazev, cena] = lines[i].split(";");
        if (!nazev) continue;

        items.push({
            nazev: nazev.trim(),
            cena: parseFloat(cena),
            mnozstvi: 0
        });
    }
}

function renderItems() {
    const container = document.getElementById("items");
    container.innerHTML = "";

    items.forEach((item, i) => {
        container.innerHTML += `
            <div class="item">
                <span>${item.nazev} - ${item.cena} Kč</span>
                <input type="number" min="0"
                    onchange="updateItem(${i}, this.value)">
            </div>
        `;
    });
}

function updateItem(i, val) {
    items[i].mnozstvi = parseInt(val) || 0;
    updateSummary();
}

function updateSummary() {
    let total = 0;
    let count = 0;

    items.forEach(i => {
        total += i.cena * i.mnozstvi;
        count += i.mnozstvi;
    });

    document.getElementById("celkem").innerText =
        "Celková cena: " + total + " Kč";

    document.getElementById("pocet").innerText =
        "Počet kusů: " + count;

    renderSummary();
}

function renderSummary() {
    const summaryDiv = document.getElementById("summaryList");
    const selected = items.filter(i => i.mnozstvi > 0);

    if (selected.length === 0) {
        summaryDiv.innerHTML = "Žádné produkty";
        return;
    }

    summaryDiv.innerHTML = "";

    selected.forEach(i => {
        summaryDiv.innerHTML += `
            ${i.nazev} - ${i.mnozstvi} ks (${i.cena * i.mnozstvi} Kč)<br>
        `;
    });
}

function validateForm() {
    let valid = true;
    const fields = ["jmeno","prijmeni","email","telefon"];

    fields.forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove("error");

        if (!el.value.trim()) {
            el.classList.add("error");
            valid = false;
        }
    });

    return valid;
}

function odeslatObjednavku() {

    if (!validateForm()) {
        alert("Prosím vyplň všechny povinné údaje!");
        return;
    }

    const hasItems = items.some(i => i.mnozstvi > 0);
    if (!hasItems) {
        alert("Vyber alespoň jeden produkt!");
        return;
    }

    const jmeno = document.getElementById("jmeno").value;
    const prijmeni = document.getElementById("prijmeni").value;
    const email = document.getElementById("email").value;
    const telefon = document.getElementById("telefon").value;

    let total = 0;

    let message = "OBJEDNÁVKA - Motorové pily\n\n";

    message += "Zákazník:\n";
    message += jmeno + " " + prijmeni + "\n";
    message += "Email: " + email + "\n";
    message += "Telefon: " + telefon + "\n\n";

    message += "Objednané produkty:\n";

    items.forEach(i => {
        if (i.mnozstvi > 0) {
            const cena = i.cena * i.mnozstvi;
            total += cena;
            message += "- " + i.nazev + " | " + i.mnozstvi + " ks | " + cena + " Kč\n";
        }
    });

    message += "\nCelková cena: " + total + " Kč\n";

    const subject = encodeURIComponent("Nová objednávka");
    const body = encodeURIComponent(message);

    window.location.href =
        `mailto:app@kostka-skola.cz?subject=${subject}&body=${body}`;
}

loadCSV();

</script>

</body>
</html>
