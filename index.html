<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Objednávka Motorové Pily</title>
<img src="${img
<style>
body {
    font-family: Arial;
    background: #f4f7fb;
}

h1 {
    text-align: center;
    background: #2a72d4;
    color: white;
    padding: 20px;
}

.container {
    width: 90%;
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
}

.item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 12px 0;
    gap: 10px;
}

/* ✅ obrázek */
.item img {
    width: 80px;
    height: 60px;
    object-fit: contain;
}

input[type="number"] {
    width: 60px;
    text-align: center;
}

#celkem, #pocet {
    text-align: center;
    font-size: 20px;
    margin-top: 10px;
    font-weight: bold;
    color: #2a72d4;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    font-size: 20px;
    background: orange;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Stihl – Motorové pily</h1>

<div class="container">
    <div id="items"></div>

    <div id="celkem">Celková cena: 0 Kč</div>
    <div id="pocet">Počet kusů: 0</div>

    <button onclick="odeslatObjednavku()">ODESLAT</button>
</div>

<script>

let items = [];

/* ✅ MAPA OBRÁZKŮ */
const images = {
    "MS 391": "https://upload.wikimedia.org/wikipedia/commons/3/3f/Chainsaw.jpg",
    "MS 462": "https://upload.wikimedia.org/wikipedia/commons/3/3f/Chainsaw.jpg",
    "MS 462 C-M R": "https://upload.wikimedia.org/wikipedia/commons/3/3f/Chainsaw.jpg",
    "MS 881": "https://upload.wikimedia.org/wikipedia/commons/3/3f/Chainsaw.jpg",
    "MS 400 C-M": "https://upload.wikimedia.org/wikipedia/commons/3/3f/Chainsaw.jpg"
};

/* ✅ načtení CSV */
async function loadCSV() {
    const res = await fetch("Stihl.csv?t=" + Date.now());
    const text = await res.text();
    parseCSV(text);
    renderItems();
}

function parseCSV(text) {
    const lines = text.split("\n");
    items = [];

    for (let i = 1; i < lines.length; i++) {
        const [nazev, cena] = lines[i].split(";");
        if (!nazev) continue;

        items.push({
            nazev: nazev.trim(),
            cena: parseFloat(cena),
            mnozstvi: 0
        });
    }
}

function renderItems() {
    const container = document.getElementById("items");
    container.innerHTML = "";

    items.forEach((item, i) => {

        const img = images[item.nazev] || "https://via.placeholder.com/80";

        container.innerHTML += `
            <div class="item">
                <img src="${img        <span>${item.nazev}<br>${item.cena} Kč</span>
                <input type="number" min="0"
                    onchange="updateItem(${i}, this.value)">
            </div>
        `;
    });
}

function updateItem(i, val) {
    items[i].mnozstvi = parseInt(val) || 0;
    updateSummary();
}

function updateSummary() {
    let total = 0;
    let count = 0;

    items.forEach(i => {
        total += i.cena * i.mnozstvi;
        count += i.mnozstvi;
    });

    document.getElementById("celkem").innerText =
        "Celková cena: " + total + " Kč";

    document.getElementById("pocet").innerText =
        "Počet kusů: " + count;
}

function odeslatObjednavku() {
    alert("Objednávka odeslána (demo)");
}

loadCSV();

</script>

</body>
</html>
