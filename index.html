<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Stihl – Motorové pily</title>

<style>
body {
    font-family: Arial;
    background: #f4f7fb;
    margin: 0;
}

h1 {
    text-align: center;
    background: #ff6b35;
    color: white;
    padding: 20px;
    margin: 0;
}

.container {
    width: 90%;
    max-width: 700px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

.item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    padding: 10px 0;
}

.item img {
    width: 80px;
    height: 60px;
    object-fit: contain;
}

.name {
    flex: 1;
    margin-left: 10px;
}

input {
    width: 60px;
    text-align: center;
}

#celkem, #pocet {
    text-align: center;
    font-size: 20px;
    margin-top: 10px;
    font-weight: bold;
    color: #ff6b35;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    font-size: 20px;
    background: #2a72d4;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Stihl – Motorové pily</h1>

<div class="container">

    <div id="items"></div>

    <div id="celkem">Celková cena: 0 Kč</div>
    <div id="pocet">Počet kusů: 0</div>

    <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>

</div>

<script>

let items = [];

/* ✅ obrázky podle názvu */
const images = {
    "MS 391": "https://upload.wikimedia.org/wikipedia/commons/3/3f/Chainsaw.jpg",
    "MS 462": "https://upload.wikimedia.org/wikipedia/commons/3/3f/Chainsaw.jpg",
    "MS 462 C-M R": "https://upload.wikimedia.org/wikipedia/commons/3/3f/Chainsaw.jpg",
    "MS 881": "https://upload.wikimedia.org/wikipedia/commons/3/3f/Chainsaw.jpg",
    "MS 400 C-M": "https://upload.wikimedia.org/wikipedia/commons/3/3f/Chainsaw.jpg"
};

/* ✅ načtení CSV */
async function loadCSV() {
    try {
        const res = await fetch("Stihl.csv");
        const text = await res.text();
        parseCSV(text);
        renderItems();
    } catch (e) {
        document.getElementById("items").innerHTML =
            "<p style='color:red'>Chyba při načítání CSV!</p>";
    }
}

/* ✅ převod CSV → data */
function parseCSV(text) {
    const lines = text.split("\n");
    items = [];

    for (let i = 1; i < lines.length; i++) {
        const [nazev, cena] = lines[i].split(";");
        if (!nazev) continue;

        items.push({
            nazev: nazev.trim(),
            cena: parseFloat(cena),
            mnozstvi: 0
        });
    }
}

/* ✅ vykreslení */
function renderItems() {
    const container = document.getElementById("items");
    container.innerHTML = "";

    items.forEach((item, i) => {

        const img = images[item.nazev] || "https://via.placeholder.com/80";

        container.innerHTML += `
            <div class="item">
                <imgg}
                <div class="name">
                    <b>${item.nazev}</b><br>
                    ${item.cena} Kč
                </div>
                <input type="number" min="0"
                    onchange="updateItem(${i}, this.value)">
            </div>
        `;
    });
}

/* ✅ změna množství */
function updateItem(i, val) {
    items[i].mnozstvi = parseInt(val) || 0;
    updateSummary();
}

/* ✅ výpočet */
function updateSummary() {
    let total = 0;
    let count = 0;

    items.forEach(i => {
        total += i.cena * i.mnozstvi;
        count += i.mnozstvi;
    });

    document.getElementById("celkem").innerText =
        "Celková cena: " + total + " Kč";

    document.getElementById("pocet").innerText =
        "Počet kusů: " + count;
}

/* ✅ odeslání */
function odeslatObjednavku() {
    alert("Objednávka odeslána (demo)");
}

/* ✅ start */
loadCSV();

</script>

</body>
</html>
