<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stihl by Fido - Motor - Pily</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f6f6;
      color: #111;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #fff;
      min-height: 100vh;
    }

    .logo-wrap {
      text-align: center;
      padding: 10px 0 25px;
    }

    .logo {
      width: 420px;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      margin: 0 0 25px;
      font-size: 18px;
      color: #444;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin: 20px 0;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
    }

    .summary div {
      font-size: 18px;
      font-weight: 700;
    }

    .form-box {
      margin-top: 20px;
      padding: 18px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
    }

    input,
    textarea,
    button {
      width: 100%;
      font: inherit;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #bbb;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 18px;
      border: 0;
      background: #0f6b3a;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #0c5830;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo-wrap">
      <img src="stihl-foto.jpg" alt="STIHL by Fido" class="logo" />
    </div>

    <h1>Stihl by Fido - Motor - Pily</h1>
    <p class="subtitle">Objednávkový formulář</p>

    <div class="summary">
      <div>Celková cena: <span id="totalPrice">0 Kč</span></div>
      <div>Počet kusů: <span id="totalCount">0</span></div>
    </div>

    <div class="form-box">
      <label for="name">VAŠE JMÉNO (Příjmení Jméno):</label>
      <input id="name" type="text" placeholder="Např. Novák Jan" />

      <label for="phone">TELEFON:</label>
      <input id="phone" type="tel" placeholder="Např. 777 123 456" />

      <label for="note">Poznámka:</label>
      <textarea id="note" placeholder="Doplňte svou objednávku..."></textarea>

      <button type="button">ODESLAT OBJEDNÁVKU</button>
    </div>
  </div>
</body>
</html>
